<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Tools & Resources Hub</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --card-hover: #262630;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2e2e38;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto 25px;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.25);
        }

        .category-section {
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, background-color 0.2s, border-color 0.2s;
        }

        .tool-card:hover {
            transform: translateY(-3px);
            background-color: var(--card-hover);
            border-color: #3f3f4e;
        }

        .tool-name {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: var(--text-color);
        }

        .tool-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .tool-link {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .tool-link:hover {
            background-color: var(--accent-hover);
        }

        .tool-link svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .status-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>

        const contentContainer = document.getElementById('contentContainer');
        const searchInput = document.getElementById('searchInput');

        function renderSources(data, filterQuery = '') {
            contentContainer.innerHTML = '';
            const query = filterQuery.toLowerCase().trim();
            let totalMatches = 0;

            Object.keys(data).forEach(category => {
                const tools = data[category];

                const filteredTools = tools.filter(tool => 
                    tool.name.toLowerCase().includes(query) || 
                    tool.description.toLowerCase().includes(query)
                );

                if (filteredTools.length > 0) {
                    totalMatches += filteredTools.length;

                    const section = document.createElement('section');
                    section.className = 'category-section';

                    const title = document.createElement('h2');
                    title.className = 'category-title';
                    title.textContent = category;
                    section.appendChild(title);

                    const grid = document.createElement('div');
                    grid.className = 'tools-grid';

                    filteredTools.forEach(tool => {
                        const card = document.createElement('div');
                        card.className = 'tool-card';

                        card.innerHTML = `
                            <div>
                                <h3 class="tool-name">${escapeHtml(tool.name)}</h3>
                                <div class="tool-description">${escapeHtml(tool.description)}</div>
                            </div>
                            <a href="${escapeHtml(tool.link)}" target="_blank" rel="noopener noreferrer" class="tool-link">
                                Open Tool
                                <svg viewBox="0 0 24 24">
                                    <path d="M14 3h7v7h-2V6.414l-9.293 9.293-1.414-1.414L17.586 5H14V3zM5 5h6v2H5v12h12v-6h2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
                                </svg>
                            </a>
                        `;
                        grid.appendChild(card);
                    });

                    section.appendChild(grid);
                    contentContainer.appendChild(section);
                }
            });

            if (totalMatches === 0 && query !== '') {
                contentContainer.innerHTML = `
                    <div class="status-msg">No tools found matching "${escapeHtml(query)}"</div>
                `;
            }
        }

        searchInput.addEventListener('input', (e) => {
            renderSources(sourcesData, e.target.value);
        });

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Render on page load
        renderSources(sourcesData);
    </script>
